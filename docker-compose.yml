version: "3.8"

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    # 🔥 THE MAGIC FIX: This maps your local folder to the container
    # Assuming your backend Dockerfile uses 'WORKDIR /app'
    volumes:
      - ./backend:/app
    restart: always

  frontend:
    build: ./frontend
    ports:
      - "5173:80" # Maps local port 5173 to Nginx's port 80
    depends_on:
      - backend
    restart: always